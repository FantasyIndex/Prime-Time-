kind = "web"
previewPath = "/"
title = "Prime Time Sports"
version = "1.0.0"
id = "artifacts/prime-time-sports"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23113
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/prime-time-sports run dev"

[services.env]
PORT = "23113"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/prime-time-sports", "run", "build"]
publicDir = "artifacts/prime-time-sports/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
